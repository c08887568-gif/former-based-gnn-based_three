<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="../src/css/linescale.css" />
	<link rel="stylesheet" href="../src/css/streakyscale.css" />
    <style>
        .square {
            width: 1000px;
            height: 1000px;
            background-color: #fff; /* 设置背景颜色为黑色 */
            /* 可选样式：去除默认的内间距和边框 */
            padding: 0;
            border: none;
        }
		.custom-scale-line
		{
			position: absolute;
			bottom: 15%;
			margin: 0 auto;
			height: 2%;
			background-color: transparent;
			padding: 0px;
			font-size: 50%;
			z-index: 1004;
			left: 100px;
		}
		.custom-scale-tick-line {
			position: relative;
			display: inline-block;
			background-color: transparent;
			top: 30%;
			margin-right: 0px;
			height: 70%;
		}
		.custom-scale-label-line {
			display: inline-block;
			position: relative; /* 绝对定位标签 */
			right: -100%; /* 可视情况调整，让标签更好地对齐刻度线 */
			transform: translateX(-50%);
			color: #000;
			vertical-align: top;
			top:105%;
		}
		.custom-scale-streaky 
		{
			position: absolute;
			bottom: 15%;
			margin: 0 auto;
			height: 0.8%;
			background-color: transparent;
			padding: 0px;
			z-index: 1004;
			left: 100px;
		}
		.custom-scale-tick-streaky  {
			position: relative;
			display: inline-block;
			background-color: transparent;
			margin-right: 0px;
			height: 100%;
		}
		.custom-scale-label-streaky  {
			display: inline-block;
			position: relative; /* 绝对定位标签 */
			right: -100%; /* 可视情况调整，让标签更好地对齐刻度线 */
			transform: translateX(-50%);
			vertical-align: top;
			top:105%;
			color: #000;
		}
    </style>
</head>
<body>
    <div id ='container' class="square"></div>
	<script src="../src/scale.js"></script>
	<script>
	var mapContainer = document.getElementById('container')	
	var customScaleContainer = document.createElement('div');
	var scaletype = 'line'
    customScaleContainer.id = scaletype;
	if (scaletype === "line") {
    	customScaleContainer.className = 'custom-scale-line';
	}
	else if (scaletype === "streaky") {
		customScaleContainer.className = 'custom-scale-streaky';
	}
	mapContainer.appendChild(customScaleContainer);
	// 调用函数生成自定义比例尺
	if (scaletype === "line") {
		createlineScale(scaletype,100, 'm', 20, 5,1);
	}
	else if (scaletype === "streaky") {
		createstreakyScale(scaletype,100, 'm', 20, 5,1);
	}
	</script>
</body>
</html>
